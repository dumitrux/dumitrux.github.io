<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Code block - messy -->
  <rect x="100" y="120" width="250" height="200" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="120" y="150" font-family="monospace" font-size="11" fill="#ef4444">// Bad code</text>
  <rect x="120" y="165" width="180" height="8" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="120" y="180" width="140" height="8" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="120" y="195" width="200" height="8" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="120" y="210" width="100" height="8" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="120" y="225" width="160" height="8" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="120" y="240" width="190" height="8" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="120" y="255" width="120" height="8" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="120" y="270" width="210" height="8" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="120" y="285" width="80" height="8" rx="2" fill="#ef4444" opacity="0.2"/>

  <!-- Arrow -->
  <path d="M380,220 L420,220" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#10b981"/></marker></defs>

  <!-- Code block - clean -->
  <rect x="450" y="120" width="250" height="200" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="470" y="150" font-family="monospace" font-size="11" fill="#10b981">// Clean code</text>
  <rect x="470" y="170" width="120" height="8" rx="2" fill="#10b981" opacity="0.25"/>
  <rect x="470" y="195" width="140" height="8" rx="2" fill="#10b981" opacity="0.25"/>
  <rect x="470" y="210" width="80" height="8" rx="2" fill="#10b981" opacity="0.25"/>
  <rect x="470" y="235" width="160" height="8" rx="2" fill="#10b981" opacity="0.25"/>
  <rect x="470" y="250" width="100" height="8" rx="2" fill="#10b981" opacity="0.25"/>
  <rect x="470" y="275" width="130" height="8" rx="2" fill="#10b981" opacity="0.25"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" font-weight="bold" fill="white">Clean Code</text>
  <text x="400" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Principles for readable, maintainable code</text>
</svg>
