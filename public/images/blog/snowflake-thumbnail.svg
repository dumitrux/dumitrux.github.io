<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Snowflake shape -->
  <circle cx="400" cy="210" r="80" fill="#29b5e8" opacity="0.08" stroke="#29b5e8" stroke-width="2"/>
  <line x1="400" y1="130" x2="400" y2="290" stroke="#29b5e8" stroke-width="2" opacity="0.5"/>
  <line x1="330" y1="170" x2="470" y2="250" stroke="#29b5e8" stroke-width="2" opacity="0.5"/>
  <line x1="330" y1="250" x2="470" y2="170" stroke="#29b5e8" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="210" r="6" fill="#29b5e8"/>

  <!-- Architecture layers on right -->
  <rect x="550" y="130" width="170" height="35" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="635" y="152" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">Cloud Services</text>

  <rect x="550" y="180" width="170" height="35" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="635" y="202" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Virtual Warehouse</text>

  <rect x="550" y="230" width="170" height="35" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="635" y="252" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">Storage Layer</text>

  <!-- Features on left -->
  <rect x="100" y="140" width="140" height="28" rx="4" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
  <text x="170" y="158" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Time Travel</text>
  <rect x="100" y="180" width="140" height="28" rx="4" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
  <text x="170" y="198" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Zero-Copy Clone</text>
  <rect x="100" y="220" width="140" height="28" rx="4" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
  <text x="170" y="238" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Auto-Scaling</text>
  <rect x="100" y="260" width="140" height="28" rx="4" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
  <text x="170" y="278" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Data Sharing</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" font-weight="bold" fill="white">Snowflake</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Cloud data platform</text>
</svg>
