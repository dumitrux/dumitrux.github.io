<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Big O curve -->
  <path d="M120,320 Q200,310 280,280 Q360,240 440,180 Q520,100 620,90 Q680,88 720,85" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.8"/>
  <path d="M120,320 Q250,315 400,300 Q550,280 720,250" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
  <path d="M120,300 Q400,290 720,290" fill="none" stroke="#10b981" stroke-width="3" opacity="0.8"/>

  <!-- Labels -->
  <text x="700" y="80" font-family="monospace" font-size="12" fill="#ef4444">O(n²)</text>
  <text x="700" y="245" font-family="monospace" font-size="12" fill="#f59e0b">O(n)</text>
  <text x="700" y="285" font-family="monospace" font-size="12" fill="#10b981">O(1)</text>

  <!-- Axes -->
  <line x1="100" y1="330" x2="740" y2="330" stroke="#475569" stroke-width="2"/>
  <line x1="100" y1="330" x2="100" y2="70" stroke="#475569" stroke-width="2"/>
  <text x="420" y="365" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">Input size (n)</text>
  <text x="70" y="200" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(-90,70,200)">Time</text>

  <!-- Data structure icons -->
  <rect x="180" y="140" width="60" height="30" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="160" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">Array</text>
  <rect x="280" y="120" width="60" height="30" rx="4" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="310" y="140" font-family="monospace" font-size="10" fill="#a855f7" text-anchor="middle">Stack</text>
  <rect x="380" y="140" width="60" height="30" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="410" y="160" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Tree</text>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="white">Big O &amp; Data Structures</text>
  <text x="400" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Notation, complexity, and concurrency</text>
</svg>
