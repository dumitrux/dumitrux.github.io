<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Virtual layer in center -->
  <rect x="280" y="140" width="240" height="140" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="170" font-family="monospace" font-size="13" fill="#10b981" text-anchor="middle" font-weight="bold">Virtual Layer</text>
  <text x="400" y="195" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Unified Data Access</text>
  <rect x="310" y="210" width="180" height="8" rx="2" fill="#10b981" opacity="0.15"/>
  <rect x="310" y="225" width="150" height="8" rx="2" fill="#10b981" opacity="0.15"/>
  <rect x="310" y="240" width="170" height="8" rx="2" fill="#10b981" opacity="0.15"/>
  <rect x="310" y="255" width="120" height="8" rx="2" fill="#10b981" opacity="0.15"/>

  <!-- Source systems -->
  <rect x="80" y="170" width="90" height="35" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="125" y="192" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">SQL Server</text>
  <rect x="80" y="220" width="90" height="35" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="125" y="242" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">Oracle</text>
  <rect x="80" y="270" width="90" height="35" rx="5" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="125" y="292" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">REST API</text>

  <!-- Consumers -->
  <rect x="630" y="170" width="90" height="35" rx="5" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="675" y="192" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">BI Tools</text>
  <rect x="630" y="220" width="90" height="35" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="675" y="242" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">Apps</text>
  <rect x="630" y="270" width="90" height="35" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="675" y="292" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">ML Models</text>

  <!-- Arrows -->
  <path d="M170,188 L275,200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M170,238 L275,220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M170,288 L275,240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M525,200 L625,188" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M525,220 L625,238" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M525,240 L625,288" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#94a3b8"/></marker></defs>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" font-weight="bold" fill="white">Denodo</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Data virtualization platform</text>
</svg>
