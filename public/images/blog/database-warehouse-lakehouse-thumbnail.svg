<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Database cylinder -->
  <ellipse cx="180" cy="180" rx="50" ry="15" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <rect x="130" y="180" width="100" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <ellipse cx="180" cy="240" rx="50" ry="15" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <line x1="130" y1="180" x2="130" y2="240" stroke="#3b82f6" stroke-width="2"/>
  <line x1="230" y1="180" x2="230" y2="240" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="218" font-family="monospace" font-size="11" fill="#3b82f6" text-anchor="middle">Database</text>

  <!-- Warehouse -->
  <rect x="330" y="160" width="120" height="90" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <rect x="345" y="175" width="90" height="12" rx="2" fill="#f59e0b" opacity="0.15"/>
  <rect x="345" y="195" width="90" height="12" rx="2" fill="#f59e0b" opacity="0.15"/>
  <rect x="345" y="215" width="90" height="12" rx="2" fill="#f59e0b" opacity="0.15"/>
  <line x1="370" y1="175" x2="370" y2="227" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="175" x2="400" y2="227" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <text x="390" y="265" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">Warehouse</text>

  <!-- Lakehouse -->
  <rect x="530" y="150" width="140" height="110" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <ellipse cx="560" cy="195" rx="15" ry="10" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <rect x="585" y="180" width="35" height="12" rx="2" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.5"/>
  <rect x="585" y="200" width="35" height="12" rx="2" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.5"/>
  <rect x="630" y="180" width="25" height="32" rx="2" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="0.5"/>
  <text x="600" y="235" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">Raw + Structured</text>
  <text x="600" y="278" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">Lakehouse</text>

  <!-- Arrows -->
  <path d="M235,210 L325,210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M455,210 L525,210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#94a3b8"/></marker></defs>

  <!-- Evolution label -->
  <text x="400" y="320" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Evolution →</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="bold" fill="white">Database vs Warehouse vs Lakehouse</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Data storage architecture evolution</text>
</svg>
