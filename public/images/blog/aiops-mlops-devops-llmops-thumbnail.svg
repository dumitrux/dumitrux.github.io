<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Four overlapping circles representing the four Ops -->
  <circle cx="300" cy="210" r="70" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="380" cy="180" r="70" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
  <circle cx="420" cy="240" r="70" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="500" cy="210" r="70" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>

  <!-- Labels inside circles -->
  <text x="275" y="215" font-family="monospace" font-size="11" fill="#3b82f6" text-anchor="middle">DevOps</text>
  <text x="365" y="160" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">MLOps</text>
  <text x="435" y="270" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">AIOps</text>
  <text x="525" y="215" font-family="monospace" font-size="11" fill="#a855f7" text-anchor="middle">LLMOps</text>

  <!-- Connecting lines -->
  <line x1="330" y1="200" x2="360" y2="190" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="200" x2="430" y2="220" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="450" y1="220" x2="480" y2="215" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="white">AIOps vs MLOps vs DevOps vs LLMOps</text>
  <text x="400" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Comparing operational frameworks</text>
</svg>
