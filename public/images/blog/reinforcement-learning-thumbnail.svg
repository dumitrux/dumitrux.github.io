<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid environment -->
  <rect x="200" y="120" width="260" height="200" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>

  <!-- Grid cells -->
  <rect x="210" y="130" width="48" height="36" rx="3" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
  <rect x="262" y="130" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="314" y="130" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="366" y="130" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="418" y="130" width="36" height="36" rx="3" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1"/>

  <rect x="210" y="170" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="262" y="170" width="48" height="36" rx="3" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <rect x="314" y="170" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="366" y="170" width="48" height="36" rx="3" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>

  <rect x="210" y="210" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="262" y="210" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="314" y="210" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="366" y="210" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>

  <rect x="210" y="250" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="262" y="250" width="48" height="36" rx="3" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <rect x="314" y="250" width="48" height="36" rx="3" fill="#475569" opacity="0.2"/>
  <rect x="366" y="250" width="48" height="36" rx="3" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Agent arrow path -->
  <text x="228" y="153" font-family="monospace" font-size="12" fill="#10b981" text-anchor="middle">🤖</text>
  <text x="440" y="153" font-family="monospace" font-size="12" fill="#f59e0b" text-anchor="middle">⭐</text>
  <text x="384" y="273" font-family="monospace" font-size="12" fill="#3b82f6" text-anchor="middle">🏁</text>

  <!-- Labels -->
  <text x="280" y="310" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">■ Obstacle</text>
  <text x="380" y="310" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">⭐ Reward</text>

  <!-- Q-value table on right -->
  <rect x="510" y="130" width="200" height="160" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="610" y="155" font-family="monospace" font-size="11" fill="#a855f7" text-anchor="middle">Q-Table</text>
  <text x="530" y="180" font-family="monospace" font-size="8" fill="#94a3b8">State  ↑    ↓    ←    →</text>
  <text x="530" y="196" font-family="monospace" font-size="8" fill="#94a3b8">S0    0.2  0.8  0.1  0.5</text>
  <text x="530" y="212" font-family="monospace" font-size="8" fill="#94a3b8">S1    0.6  0.3  0.4  0.9</text>
  <text x="530" y="228" font-family="monospace" font-size="8" fill="#94a3b8">S2    0.1  0.7  0.8  0.2</text>
  <text x="530" y="244" font-family="monospace" font-size="8" fill="#94a3b8">S3    0.9  0.1  0.3  0.4</text>

  <!-- Reward equation -->
  <text x="610" y="275" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">R = Σ γᵗ · rₜ</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="white">Reinforcement Learning</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Reward-based learning and Q-learning</text>
</svg>
