<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Multiple worker nodes -->
  <rect x="280" y="120" width="240" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="145" font-family="monospace" font-size="12" fill="#3b82f6" text-anchor="middle">Coordinator</text>

  <!-- Worker nodes -->
  <rect x="120" y="220" width="100" height="70" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="170" y="250" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Worker 1</text>
  <rect x="130" y="260" width="80" height="6" rx="2" fill="#10b981" opacity="0.3"/>
  <rect x="130" y="272" width="60" height="6" rx="2" fill="#10b981" opacity="0.3"/>

  <rect x="280" y="220" width="100" height="70" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="330" y="250" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Worker 2</text>
  <rect x="290" y="260" width="80" height="6" rx="2" fill="#10b981" opacity="0.3"/>
  <rect x="290" y="272" width="70" height="6" rx="2" fill="#10b981" opacity="0.3"/>

  <rect x="440" y="220" width="100" height="70" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="490" y="250" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Worker 3</text>
  <rect x="450" y="260" width="80" height="6" rx="2" fill="#10b981" opacity="0.3"/>
  <rect x="450" y="272" width="55" height="6" rx="2" fill="#10b981" opacity="0.3"/>

  <rect x="600" y="220" width="100" height="70" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="650" y="250" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Worker N</text>
  <rect x="610" y="260" width="80" height="6" rx="2" fill="#10b981" opacity="0.3"/>
  <rect x="610" y="272" width="65" height="6" rx="2" fill="#10b981" opacity="0.3"/>

  <!-- Connections -->
  <line x1="350" y1="160" x2="170" y2="220" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="380" y1="160" x2="330" y2="220" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="420" y1="160" x2="490" y2="220" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="450" y1="160" x2="650" y2="220" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Data chunks flowing -->
  <rect x="200" y="330" width="40" height="20" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <rect x="320" y="330" width="40" height="20" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <rect x="480" y="330" width="40" height="20" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <rect x="640" y="330" width="40" height="20" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="370" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Data Partitions</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="white">Distributed Processing</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Parallel computation across clusters</text>
</svg>
