<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Dimension/Measure concept -->
  <rect x="120" y="130" width="200" height="170" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="155" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="bold">Dimensions</text>
  <text x="140" y="180" font-family="monospace" font-size="10" fill="#94a3b8">📅 Date</text>
  <text x="140" y="200" font-family="monospace" font-size="10" fill="#94a3b8">🌍 Region</text>
  <text x="140" y="220" font-family="monospace" font-size="10" fill="#94a3b8">📦 Product</text>
  <text x="140" y="240" font-family="monospace" font-size="10" fill="#94a3b8">👤 Customer</text>
  <text x="140" y="260" font-family="monospace" font-size="10" fill="#94a3b8">🏷️ Category</text>

  <rect x="380" y="130" width="200" height="170" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="480" y="155" font-family="monospace" font-size="13" fill="#10b981" text-anchor="middle" font-weight="bold">Measures</text>
  <text x="400" y="180" font-family="monospace" font-size="10" fill="#94a3b8">💰 Revenue</text>
  <text x="400" y="200" font-family="monospace" font-size="10" fill="#94a3b8">📊 Quantity</text>
  <text x="400" y="220" font-family="monospace" font-size="10" fill="#94a3b8">📈 Growth %</text>
  <text x="400" y="240" font-family="monospace" font-size="10" fill="#94a3b8">⏱️ Duration</text>
  <text x="400" y="260" font-family="monospace" font-size="10" fill="#94a3b8">🎯 Score</text>

  <!-- Info Mart -->
  <rect x="620" y="160" width="120" height="110" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="680" y="185" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Info Mart</text>
  <rect x="640" y="200" width="80" height="8" rx="2" fill="#f59e0b" opacity="0.2"/>
  <rect x="640" y="215" width="60" height="8" rx="2" fill="#f59e0b" opacity="0.2"/>
  <rect x="640" y="230" width="70" height="8" rx="2" fill="#f59e0b" opacity="0.2"/>
  <rect x="640" y="245" width="50" height="8" rx="2" fill="#f59e0b" opacity="0.2"/>

  <!-- Arrow -->
  <path d="M585,215 L615,215" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#94a3b8"/></marker></defs>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" font-weight="bold" fill="white">Data Literacy</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Dimensions, measures, and information marts</text>
</svg>
