<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Test pyramid -->
  <polygon points="400,120 220,310 580,310" fill="none" stroke="#475569" stroke-width="2"/>

  <!-- Layers -->
  <rect x="280" y="260" width="240" height="40" rx="4" fill="#10b981" opacity="0.15"/>
  <text x="400" y="285" font-family="monospace" font-size="12" fill="#10b981" text-anchor="middle">Unit Tests</text>

  <rect x="310" y="210" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.15"/>
  <text x="400" y="235" font-family="monospace" font-size="12" fill="#f59e0b" text-anchor="middle">Integration</text>

  <rect x="350" y="160" width="100" height="40" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="400" y="185" font-family="monospace" font-size="11" fill="#ef4444" text-anchor="middle">E2E</text>

  <!-- Pytest code block on right -->
  <rect x="600" y="140" width="160" height="170" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="620" y="165" font-family="monospace" font-size="9" fill="#a855f7">def</text>
  <text x="644" y="165" font-family="monospace" font-size="9" fill="#10b981"> test_sum():</text>
  <text x="630" y="185" font-family="monospace" font-size="9" fill="#94a3b8">result = add(2, 3)</text>
  <text x="630" y="205" font-family="monospace" font-size="9" fill="#94a3b8">assert result == 5</text>
  <text x="620" y="235" font-family="monospace" font-size="9" fill="#a855f7">def</text>
  <text x="644" y="235" font-family="monospace" font-size="9" fill="#10b981"> test_neg():</text>
  <text x="630" y="255" font-family="monospace" font-size="9" fill="#94a3b8">result = add(-1, 1)</text>
  <text x="630" y="275" font-family="monospace" font-size="9" fill="#94a3b8">assert result == 0</text>

  <!-- TDD cycle -->
  <circle cx="130" cy="220" r="50" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="130" y="190" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">Red</text>
  <text x="155" y="240" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">Green</text>
  <text x="105" y="240" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">Refactor</text>
  <text x="130" y="215" font-family="monospace" font-size="8" fill="#a855f7" text-anchor="middle">TDD</text>

  <!-- Pass/fail indicators -->
  <text x="400" y="340" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">✓ 42 passed  </text>
  <text x="500" y="340" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">✗ 1 failed</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="white">Testing with Pytest &amp; TDD</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Test pyramid, fixtures, and red-green-refactor</text>
</svg>
