<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Agent loop -->
  <circle cx="400" cy="220" r="100" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Agent nodes -->
  <rect x="360" y="120" width="80" height="35" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="142" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">Plan</text>

  <rect x="480" y="190" width="80" height="35" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="520" y="212" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Code</text>

  <rect x="360" y="290" width="80" height="35" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="312" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">Test</text>

  <rect x="240" y="190" width="80" height="35" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="280" y="212" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">Review</text>

  <!-- Arrows between nodes -->
  <path d="M440,140 Q480,150 485,190" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M520,225 Q500,280 440,300" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M360,300 Q310,280 310,225" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M280,190 Q300,150 360,138" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#94a3b8"/></marker></defs>

  <!-- AI sparkle in center -->
  <text x="400" y="225" font-family="system-ui,sans-serif" font-size="24" fill="#a855f7" text-anchor="middle">✦</text>

  <!-- Tools on the side -->
  <rect x="600" y="150" width="100" height="24" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="650" y="166" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">IDE Agent</text>
  <rect x="600" y="185" width="100" height="24" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="650" y="201" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">CLI Agent</text>
  <rect x="600" y="220" width="100" height="24" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="650" y="236" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">MCP Server</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="white">Agentic Software Delivery</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Foundations of AI-assisted development</text>
</svg>
