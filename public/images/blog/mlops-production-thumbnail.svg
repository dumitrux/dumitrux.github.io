<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Pipeline stages -->
  <rect x="80" y="175" width="100" height="55" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="200" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">Data</text>
  <text x="130" y="215" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">Prep</text>

  <rect x="220" y="175" width="100" height="55" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="270" y="200" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Train</text>
  <text x="270" y="215" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Model</text>

  <rect x="360" y="175" width="100" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="410" y="200" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">Validate</text>
  <text x="410" y="215" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">&amp; Test</text>

  <rect x="500" y="175" width="100" height="55" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="550" y="200" font-family="monospace" font-size="10" fill="#a855f7" text-anchor="middle">Deploy</text>
  <text x="550" y="215" font-family="monospace" font-size="10" fill="#a855f7" text-anchor="middle">Serve</text>

  <rect x="640" y="175" width="100" height="55" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="690" y="200" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">Monitor</text>
  <text x="690" y="215" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">Retrain</text>

  <!-- Arrows -->
  <path d="M180,202 L215,202" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M320,202 L355,202" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M460,202 L495,202" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M600,202 L635,202" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#94a3b8"/></marker></defs>

  <!-- Feedback loop -->
  <path d="M690,235 Q690,300 400,300 Q130,300 130,235" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowr)"/>
  <defs><marker id="arrowr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#ef4444"/></marker></defs>
  <text x="400" y="318" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">feedback loop</text>

  <!-- CI/CD label -->
  <rect x="200" y="130" width="440" height="25" rx="4" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-width="1"/>
  <text x="420" y="147" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">CI/CD Pipeline — Automated &amp; Reproducible</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="white">MLOps: Models to Production</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">End-to-end ML lifecycle management</text>
</svg>
