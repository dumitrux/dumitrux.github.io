<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Domain nodes -->
  <rect x="140" y="130" width="130" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="205" y="160" font-family="monospace" font-size="11" fill="#3b82f6" text-anchor="middle">Sales Domain</text>

  <rect x="340" y="130" width="130" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="405" y="160" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">Product Domain</text>

  <rect x="540" y="130" width="130" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="605" y="160" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">Finance Domain</text>

  <!-- Data products -->
  <circle cx="175" cy="240" r="20" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="235" cy="240" r="20" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="375" cy="240" r="20" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="435" cy="240" r="20" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="575" cy="240" r="20" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="635" cy="240" r="20" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Connections between data products (mesh) -->
  <line x1="235" y1="240" x2="375" y2="240" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="435" y1="240" x2="575" y2="240" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="175" y1="255" x2="575" y2="255" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Lines from domains to products -->
  <line x1="205" y1="180" x2="175" y2="220" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="205" y1="180" x2="235" y2="220" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="405" y1="180" x2="375" y2="220" stroke="#10b981" stroke-width="1.5"/>
  <line x1="405" y1="180" x2="435" y2="220" stroke="#10b981" stroke-width="1.5"/>
  <line x1="605" y1="180" x2="575" y2="220" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="605" y1="180" x2="635" y2="220" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Platform bar at bottom -->
  <rect x="140" y="300" width="530" height="35" rx="6" fill="#a855f7" opacity="0.1" stroke="#a855f7" stroke-width="1.5"/>
  <text x="405" y="322" font-family="monospace" font-size="11" fill="#a855f7" text-anchor="middle">Self-Serve Data Platform</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" font-weight="bold" fill="white">Data Mesh</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Decentralized data architecture</text>
</svg>
