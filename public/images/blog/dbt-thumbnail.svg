<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- DAG pipeline -->
  <!-- Source nodes -->
  <rect x="100" y="160" width="90" height="35" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="145" y="182" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">source_a</text>
  <rect x="100" y="220" width="90" height="35" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="145" y="242" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">source_b</text>

  <!-- Staging -->
  <rect x="250" y="160" width="90" height="35" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="295" y="182" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">stg_orders</text>
  <rect x="250" y="220" width="90" height="35" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="295" y="242" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">stg_users</text>

  <!-- Intermediate -->
  <rect x="400" y="185" width="100" height="35" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="207" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">int_joined</text>

  <!-- Mart -->
  <rect x="560" y="185" width="100" height="35" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="610" y="207" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">fct_revenue</text>

  <!-- Arrows -->
  <path d="M190,178 L245,178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M190,238 L245,238" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M340,178 L395,195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M340,238 L395,210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M500,202 L555,202" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#94a3b8"/></marker></defs>

  <!-- Layer labels -->
  <text x="145" y="285" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">Sources</text>
  <text x="295" y="285" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Staging</text>
  <text x="450" y="285" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">Intermediate</text>
  <text x="610" y="285" font-family="monospace" font-size="10" fill="#a855f7" text-anchor="middle">Marts</text>

  <!-- dbt test icon -->
  <rect x="560" y="240" width="100" height="24" rx="4" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="610" y="256" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">✓ tests pass</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" font-weight="bold" fill="white">dbt: Data Build Tool</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Transform data with SQL and software engineering</text>
</svg>
