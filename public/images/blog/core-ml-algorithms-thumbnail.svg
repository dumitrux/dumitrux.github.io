<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Decision tree -->
  <circle cx="400" cy="130" r="20" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
  <line x1="385" y1="148" x2="300" y2="200" stroke="#3b82f6" stroke-width="2"/>
  <line x1="415" y1="148" x2="500" y2="200" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="300" cy="210" r="15" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="2"/>
  <circle cx="500" cy="210" r="15" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="2"/>
  <line x1="290" y1="224" x2="240" y2="265" stroke="#10b981" stroke-width="1.5"/>
  <line x1="310" y1="224" x2="360" y2="265" stroke="#10b981" stroke-width="1.5"/>
  <line x1="490" y1="224" x2="440" y2="265" stroke="#10b981" stroke-width="1.5"/>
  <line x1="510" y1="224" x2="560" y2="265" stroke="#10b981" stroke-width="1.5"/>

  <!-- Leaf nodes -->
  <rect x="220" y="270" width="40" height="20" rx="4" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="340" y="270" width="40" height="20" rx="4" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="420" y="270" width="40" height="20" rx="4" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="540" y="270" width="40" height="20" rx="4" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Algorithm labels -->
  <rect x="100" y="150" width="90" height="28" rx="5" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="145" y="168" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">Regression</text>
  <rect x="100" y="195" width="90" height="28" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="145" y="213" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">Clustering</text>
  <rect x="100" y="240" width="90" height="28" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="145" y="258" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">SVM</text>
  <rect x="100" y="285" width="90" height="28" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="145" y="303" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">k-NN</text>

  <!-- Scatter plot on the right -->
  <rect x="600" y="130" width="150" height="120" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <circle cx="630" cy="160" r="4" fill="#3b82f6"/>
  <circle cx="650" cy="175" r="4" fill="#3b82f6"/>
  <circle cx="640" cy="150" r="4" fill="#3b82f6"/>
  <circle cx="700" cy="200" r="4" fill="#ef4444"/>
  <circle cx="720" cy="220" r="4" fill="#ef4444"/>
  <circle cx="710" cy="190" r="4" fill="#ef4444"/>
  <circle cx="680" cy="180" r="4" fill="#10b981"/>
  <circle cx="670" cy="210" r="4" fill="#10b981"/>
  <path d="M620,235 Q660,170 740,145" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="white">Core ML Algorithms</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">Classification, regression, clustering &amp; more</text>
</svg>
